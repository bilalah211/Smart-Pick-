name: ecommerceapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  google_fonts: ^6.3.2
  smooth_page_indicator: ^1.2.1
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.2.0
  http: ^1.5.0
  permission_handler: ^11.0.0
  flutter_spinkit: ^5.2.2
  shared_preferences: ^2.5.3
  flutter_native_splash: ^2.4.6
  uuid: ^4.5.1
  carousel_slider: ^5.1.1
  iconsax: ^0.0.8
  shimmer: ^3.0.0
  intl: ^0.20.2
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/png/
    - assets/onbaording/
    - assets/icons/
    - assets/banners/
    - assets/categories/
